name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-version tag to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install development dependencies
        run: npm ci

      - name: Run tests
        env:
          HOME: /root
        run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        id: tag
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.ref_name }}
        shell: bash
        run: |
          if [[ ! "$REQUESTED_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use semantic version format vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          echo "name=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"

      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: lts/*

      - name: Build public distribution
        run: npm run build:pages

      - name: Package distribution and checksum
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
        shell: bash
        run: |
          archive="compact-theme-${RELEASE_TAG}.zip"
          (cd _site && zip -q -r "../${archive}" .)
          sha256sum "$archive" > "${archive}.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
        shell: bash
        run: |
          archive="compact-theme-${RELEASE_TAG}.zip"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$archive" "${archive}.sha256" --clobber
          else
            gh release create "$RELEASE_TAG" "$archive" "${archive}.sha256" \
              --verify-tag \
              --generate-notes \
              --title "Compact Theme ${RELEASE_TAG}"
          fi
